name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_DATA_PROVIDER: supabase
      VITE_ENABLE_MFA: false
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Compute Pages Base Path
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY%%/*}"

          if [ "$REPO_NAME" = "${OWNER_NAME}.github.io" ]; then
            echo "PAGES_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "PAGES_BASE_PATH=/$REPO_NAME/" >> "$GITHUB_ENV"
          fi

          echo "VITE_ROUTER_MODE=hash" >> "$GITHUB_ENV"

      - name: Install Dependencies
        run: npm ci

      - name: Validate Supabase Build Secrets
        run: |
          test -n "$VITE_SUPABASE_URL" || (echo "Missing VITE_SUPABASE_URL GitHub secret" && exit 1)
          test -n "$VITE_SUPABASE_ANON_KEY" || (echo "Missing VITE_SUPABASE_ANON_KEY GitHub secret" && exit 1)

      - name: Build
        run: npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy To Pages
        id: deployment
        uses: actions/deploy-pages@v4
